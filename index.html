<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Pinyin Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Noto Sans SC', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">
  <div class="max-w-3xl mx-auto px-6 py-20">
    <header class="text-center mb-12">
      <h1 class="text-4xl font-semibold tracking-tight text-gray-900 mb-3">Chinese Pinyin Tools</h1>
      <p class="text-gray-600">Two simple tools for practicing Mandarin pinyin.</p>
    </header>

    <main class="grid gap-4 md:grid-cols-2">
      <a href="pinyin-practice.html" class="bg-white rounded-2xl border border-gray-200 p-6 transition hover:border-gray-300 hover:bg-gray-50">
        <div class="text-xs font-medium uppercase tracking-[0.18em] text-gray-400 mb-3">Tool</div>
        <h2 class="text-xl font-semibold text-gray-900 mb-2">Pinyin Practice</h2>
        <p class="text-sm leading-6 text-gray-600">Practice listening, typing, tone discrimination, double-syllable drills, and speech recognition.</p>
      </a>

      <a href="pinyin-chart.html" class="bg-white rounded-2xl border border-gray-200 p-6 transition hover:border-gray-300 hover:bg-gray-50">
        <div class="text-xs font-medium uppercase tracking-[0.18em] text-gray-400 mb-3">Tool</div>
        <h2 class="text-xl font-semibold text-gray-900 mb-2">Pinyin Chart</h2>
        <p class="text-sm leading-6 text-gray-600">Explore the Mandarin pinyin chart with selectable tones and clickable audio playback.</p>
      </a>
    </main>
  </div>
</body>
</html>
